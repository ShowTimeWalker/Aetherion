<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetherion 游戏目录</title>
    <style>
      :root {
        font-family: "Inter", "Microsoft YaHei UI", sans-serif;
        color: #f3f4f6;
        background: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px 20px;
        background:
          radial-gradient(circle at top, rgba(34, 197, 94, 0.16), transparent 35%),
          linear-gradient(180deg, #111827 0%, #020617 100%);
      }

      main {
        width: min(100%, 840px);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 28px 0 0;
        display: grid;
        gap: 14px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.22);
      }

      a:hover {
        border-color: rgba(74, 222, 128, 0.7);
        transform: translateY(-1px);
      }

      strong {
        display: block;
        margin-bottom: 6px;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aetherion 游戏目录</h1>
      <p>这里是 `games/` 下各独立小游戏的静态入口列表。</p>

      <ul>
        <li><a href="./2048/index.html"><strong>2048</strong><span>数字合成挑战</span></a></li>
        <li><a href="./breakout/index.html"><strong>Breakout</strong><span>经典打砖块</span></a></li>
        <li><a href="./flappy-bird/index.html"><strong>Flappy Bird</strong><span>像素风穿越障碍</span></a></li>
        <li><a href="./jump-game/index.html"><strong>Jump Game</strong><span>节奏跳跃挑战</span></a></li>
        <li><a href="./minesweeper/index.html"><strong>扫雷</strong><span>9x9 初级难度经典扫雷</span></a></li>
        <li><a href="./snake/index.html"><strong>Snake</strong><span>经典贪吃蛇</span></a></li>
      </ul>
    </main>
  </body>
</html>
