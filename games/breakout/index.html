<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块 - Breakout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="lives">生命: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameOverlay" class="overlay">
            <div class="overlay-content">
                <h2 id="overlayTitle">打砖块</h2>
                <p id="overlayMessage">使用左右箭头键或鼠标移动挡板</p>
                <button id="startBtn" class="btn">开始游戏</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
