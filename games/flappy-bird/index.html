<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="hero-card">
        <div>
          <p class="badge">Aetherion / Flappy Bird</p>
          <h1>Flappy Bird</h1>
          <p class="tip">按空格、点击鼠标或轻触画布振翅，穿过管道并不断刷新分数。</p>
        </div>

        <div class="score-cluster" aria-label="分数面板">
          <section class="score-panel">
            <span>分数</span>
            <strong id="score">0</strong>
          </section>
          <section class="score-panel">
            <span>最佳</span>
            <strong id="best-score">0</strong>
          </section>
        </div>
      </header>

      <section class="control-card">
        <div>
          <p class="badge badge--muted">状态</p>
          <p id="status" class="status">等待起飞，按空格或点击画布开始。</p>
        </div>

        <button id="restart" type="button">重新开始</button>
      </section>

      <section class="board-card">
        <canvas
          id="board"
          width="432"
          height="768"
          aria-label="Flappy Bird 游戏画布"
        ></canvas>
      </section>

      <footer class="footer-card">
        <p>操作：`Space` / 鼠标点击 / 触屏点击</p>
        <p>规则：撞到地面、顶部或管道即结束。</p>
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
