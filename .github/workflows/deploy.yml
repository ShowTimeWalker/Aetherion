name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      APP_DIR: ${{ vars.SERVER_APP_DIR }}
      SITE_DIR: ${{ vars.SERVER_SITE_DIR }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
      NGINX_SERVICE_NAME: ${{ vars.NGINX_SERVICE_NAME }}
      RELOAD_NGINX: ${{ vars.RELOAD_NGINX }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Deployment Secrets
        shell: bash
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -Eeuo pipefail

          : "${SERVER_HOST:?Missing SERVER_HOST secret}"
          : "${SERVER_USER:?Missing SERVER_USER secret}"
          : "${SERVER_SSH_KEY:?Missing SERVER_SSH_KEY secret}"

      - name: Configure SSH
        shell: bash
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -Eeuo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$SERVER_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          SERVER_PORT="${SERVER_PORT:-22}"
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Run Remote Deploy Script
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          retry_on: error
          command: |
            set -Eeuo pipefail

            SERVER_PORT="${SERVER_PORT:-22}"
            APP_DIR="${APP_DIR:-/opt/aetherion}"
            SITE_DIR="${SITE_DIR:-/var/www/aetherion}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            NGINX_SERVICE_NAME="${NGINX_SERVICE_NAME:-nginx}"
            RELOAD_NGINX="${RELOAD_NGINX:-true}"

            ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
              "APP_DIR='$APP_DIR' SITE_DIR='$SITE_DIR' BRANCH='$DEPLOY_BRANCH' NGINX_SERVICE_NAME='$NGINX_SERVICE_NAME' RELOAD_NGINX='$RELOAD_NGINX' bash -s" \
              < scripts/server/deploy.sh
